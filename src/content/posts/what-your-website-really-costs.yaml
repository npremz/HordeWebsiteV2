keyTakeaways_fr:
  - Le coût caché d'un site ordinaire vient surtout des conversions perdues, du SEO qui stagne et de la crédibilité abîmée.
  - Des problèmes techniques discrets peuvent faire perdre du chiffre d'affaires sans alerte visible.
  - Un audit sérieux sert à quantifier les pertes et à prioriser ce qu'il faut corriger avant de lancer une refonte.
keyTakeaways_en:
  - The hidden cost of an average website mainly comes from lost conversions, stagnant SEO, and weakened credibility.
  - Subtle technical issues can reduce revenue without any visible warning.
  - A serious audit helps quantify those losses and prioritize fixes before a redesign.
