excerpt_fr: >-
  Vos réseaux sociaux tournent bien. Mais à quel point votre business en dépend
  ? Un site web, c'est reprendre le contrôle sur votre présence en ligne.
excerpt_en: >-
  Your social media is doing well. But how dependent is your business on it? A
  website means taking back control of your online presence.
