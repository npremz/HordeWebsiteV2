intro: >-
  Un e-commerce qui convertit, ce n'est pas qu'une belle boutique. C'est un site
  rapide, des parcours d'achat sans friction, et un référencement qui attire la
  bonne audience. On conçoit des boutiques qui rendent vos produits accessibles,
  parce qu'une interface ne devrait pas être un frein à votre business.
problemTitle: Ce qui sépare un e-commerce qui vend d'un qui ne vend pas
problemBlocks:
  - kind: paragraph
    body: >-
      La plupart des boutiques en ligne perdent des clients sur des détails qui
      semblent anodins : un temps de chargement de 2 secondes de trop, un
      formulaire d'adresse en 12 étapes, des photos qui mettent 4s à s'afficher
      sur mobile. Ces frictions s'accumulent et se mesurent dans le taux
      d'abandon de panier.
    items: []
  - kind: paragraph
    body: >-
      Les e-commerces qu'on construit ont un but en tête : que les utilisateurs
      aillent jusqu'au bout. Chaque décision va dans ce sens, de la base
      technique jusqu'à la taille des boutons.
    items: []
offerTitle: Nos solutions en e-commerce
offerItems:
  - title: Boutiques Shopify
    body: >-
      Configuration, thème sur mesure ou personnalisation poussée, apps
      sélectionnées, checkout optimisé. Shopify est notre recommandation pour la
      majorité des boutiques. C'est robuste, évolutif, maintenu.
  - title: E-commerces sur mesure
    body: >-
      Pour les besoins spécifiques que Shopify ne couvre pas : catalogue
      complexe, logique métier particulière, intégration ERP/WMS, modèles B2B.
      On développe sur des bases solides (Next.js, Astro + headless commerce).
  - title: Migration e-commerce
    body: >-
      Vous avez une boutique existante qui ne répond plus à vos besoins ? On
      migre vers une nouvelle plateforme sans perdre l'historique de commandes,
      les avis clients, et le référencement acquis.
methodTitle: Nos standards pour un e-commerce
methodSteps:
  - title: UX & parcours d'achat
    body: >-
      Fiches produit conçues pour convertir, navigation par facettes, tunnel de
      commande simplifié, gestion des erreurs claire. On cartographie les
      parcours avant de dessiner quoi que ce soit.
  - title: Performance technique
    body: >-
      Images en WebP/AVIF avec lazy loading, JS minimal, Core Web Vitals dans le
      vert. Un e-commerce lent sur mobile laisse de l'argent sur la table. Pour
      nous, la rapidité est un standard.
  - title: SEO e-commerce
    body: >-
      Données structurées produits (schema.org), balises canoniques pour les
      variantes, sitemap produit, URLs propres. Les bases qui conditionnent
      votre visibilité sur Google Shopping et la recherche organique.
  - title: Paiement & logistique
    body: >-
      Intégration Stripe, Mollie, Bancontact, PayPal. Connexion aux
      transporteurs (Bpost, DPD, Sendcloud). On configure ce dont vous avez
      besoin, pas un catalogue de fonctionnalités que vous n'utiliserez jamais.
deliverablesTitle: Résumé du produit Après livraison
deliverables:
  - Boutique en production, rapide sur mobile et desktop
  - Core Web Vitals dans le vert
  - SEO e-commerce technique en place dès le lancement
  - Formation à la gestion du catalogue et des commandes
  - Documentation des paramètres et des intégrations
  - Monitoring 30 jours post-lancement inclus
exclusionsTitle: Les choses qu'on évite de faire
exclusionsParagraphs:
  - >-
    On ne livre pas une installation Shopify par défaut avec un thème gratuit et
    quelques apps. On ne met pas non plus en ligne sans avoir testé le tunnel de
    commande sur mobile. Et on ne code pas sans avoir compris votre catalogue,
    vos transporteurs et vos contraintes logistiques.
faqTitle: Nos réponses aux questions fréquentes
faqItems:
  - question: Shopify ou WooCommerce pour créer un site e-commerce ?
    answer: >-
      Pour la grande majorité des projets, Shopify. Plus rapide à lancer, plus
      stable, moins de maintenance. WooCommerce a du sens si vous êtes déjà sur
      WordPress et que votre catalogue est limité. On en discute selon votre
      situation.
  - question: Combien coûte un site e-commerce à Bruxelles ?
    answer: >-
      Un Shopify sur mesure : entre 5 000 € et 12 000 €. Un e-commerce custom
      avec logique spécifique : à partir de 15 000 €. Les variables principales
      : taille du catalogue, intégrations, niveau de personnalisation.
  - question: Puis-je gérer les produits et commandes moi-même après ?
    answer: >-
      Oui, c'est une condition non négociable. On forme votre équipe et on
      documente tout. Vous ne dépendez pas de nous pour ajouter un produit,
      modifier un prix ou gérer les commandes.
  - question: Le SEO e-commerce est-il inclus à la mise en ligne ?
    answer: >-
      On livre une boutique avec des bases SEO techniques solides : URLs
      propres, métadonnées produits, performance, données structurées et règles
      canoniques. Le contenu SEO continu et le netlinking peuvent être gérés
      avec des partenaires.
  - question: Mon site e-commerce actuel peut-il être migré ?
    answer: >-
      Dans la quasi-totalité des cas, oui. On évalue la migration lors de
      l'audit initial : données produits, commandes, avis, redirections.
