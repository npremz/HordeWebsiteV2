notes:
  - >-
    Le lecteur cible : une PME ou un indépendant qui veut vendre en ligne, ou
    qui a déjà une boutique qui sous-performe.
  - >-
    Éviter de lister trop de technologies — ça intéresse rarement le décideur.
    L'important : ce que ça change pour son business.
  - >-
    Ne pas promettre "le meilleur taux de conversion de votre secteur" — trop
    vague et invérifiable.
  - >-
    Ton : pragmatique, direct. On parle e-commerce comme un artisan parle de son
    métier, pas comme une brochure Salesforce.
  - >-
    Le point de différenciation : performance + UX en amont, pas juste "on
    installe Shopify".
