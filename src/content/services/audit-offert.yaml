notes:
  - >-
    Ton : direct, crédible, sans sur-vente. Pas de "offre exceptionnelle" ni de
    "ne manquez pas".
  - >-
    L'audit est positionné comme une démonstration de méthode, pas comme un
    appât commercial.
  - >-
    Insister sur la rapidité (48h) et l'absence d'engagement — les deux
    objections principales sur ce type d'offre.
  - >-
    Éviter les tournures génériques : "nous vous aidons à atteindre vos
    objectifs", "solution adaptée à vos besoins".
