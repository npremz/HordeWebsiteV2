translations:
  en:
    seoUrl: /en/services/optimisation-site-web
    seoPrimaryKeyword: website optimization brussels
    seoSecondaryKeywords:
      - improve core web vitals
      - slow website fix
      - web performance seo
      - lcp inp cls optimization
      - website performance audit
    seoTitle: Website optimization in Brussels
    seoDescription: >-
      Is your website slow or poorly ranked? We improve LCP, INP, CLS and
      technical SEO with a prioritized action plan, without a full redesign.
    seoInternalLinks:
      - /en/services/audit-offert
      - /en/services/refonte-site-web
      - /en/contact
    h1: Website optimization
    shortName: Website optimization
    footerTitle: Optimization
    intro: >-
      A website that loads in 4 seconds can lose visitors before they even see
      your content. We improve technical performance without starting from
      scratch and without touching what already works.
    problemTitle: Your website may be suffering from this
    problemBlocks:
      - kind: list
        items:
          - Google Search Console shows unresolved Core Web Vitals issues
          - PageSpeed Insights reports red mobile scores
          - Your SEO is stagnant despite regular content
          - Key pages take more than 3 seconds to display on a normal network
          - Bounce rate is high without a clear explanation
      - kind: paragraph
        body: >-
          If one of these sounds familiar, the issue is probably technical, not
          only related to your content.
        items: []
    offerTitle: Main optimization areas
    offerItems:
      - title: LCP (Largest Contentful Paint)
        body: >-
          Critical image preload, WebP/AVIF formats and render-blocking cleanup.
          We target what delays the main content.
      - title: INP (Interaction to Next Paint)
        body: >-
          JavaScript audit, long task reduction and event listener optimization.
          The work that makes a site respond faster to clicks.
      - title: CLS (Cumulative Layout Shift)
        body: >-
          Explicit media dimensions, font loading and dynamic elements. We remove
          the visual jumps that frustrate users.
      - title: Technical SEO
        body: >-
          Tag structure, structured data, canonicals, hreflang and crawl speed.
          The foundations behind organic visibility.
      - title: Infrastructure & cache
        body: >-
          Cache headers, CDN, compression and HTTP/2. The backend details that
          matter on slower connections.
    methodTitle: How we optimize your website
    methodSteps:
      - title: Initial diagnostic
        body: >-
          Lighthouse, CrUX and WebPageTest measurements on key pages, not just
          the homepage.
      - title: Prioritized action plan
        body: Quick wins first, structural optimizations next.
      - title: Implementation
        body: >-
          We work directly in the codebase or alongside your technical team.
      - title: Validation
        body: >-
          Before/after measurements and 30-day Google Search Console follow-up.
          We deliver metrics, not promises.
    deliverablesTitle: What is delivered
    deliverables:
      - Diagnostic report with documented starting scores
      - Prioritized action plan with quick wins and structural fixes
      - Implementation of corrections
      - Before/after measurements for each treated area
      - 30-day Google Search Console follow-up
      - Documentation of what was done and why
    exclusionsTitle: What we avoid doing
    exclusionsParagraphs:
      - >-
        We do not install a magic cache plugin and call it optimization. We do
        not promise +50% traffic in 3 weeks. And we do not sell a monthly plan
        to monitor metrics you can already see in Google Search Console.
      - >-
        What we deliver: a measurably faster site, healthier Core Web Vitals and
        documentation of what changed.
    faqTitle: Answers to common questions
    faqItems:
      - question: Does my site need to use a specific technology?
        answer: >-
          No. We optimize WordPress, Webflow, Shopify, Next.js and custom sites.
          Some operations require code access; we adapt to your constraints.
      - question: Do we need to redesign the whole site?
        answer: >-
          Not necessarily. Many performance gains are possible without touching
          the design. If a redesign is the better option, we explain why with
          data.
      - question: How long does it take?
        answer: >-
          Quick wins such as images, cache and render-blocking can be handled in
          a week. Deeper work takes 1 to 3 weeks depending on complexity.
      - question: What results should I expect?
        answer: >-
          It depends on the starting point. On sites with PageSpeed scores below
          50, moving into the 80-95 range is common. SEO impact is visible in
          Search Console over 6 to 12 weeks.
      - question: How much does it cost?
        answer: >-
          It depends on the depth of the work. We quote after the initial
          diagnostic, which is free.
    ctaTitle: Start with an audit
    ctaParagraphs:
      - >-
        Fill in the form with your details and a member of our team will contact
        you for a no-commitment consultation.
      - >-
        You can also email us at hello@hordeagence.com
    primaryCtaLabel: Request a free audit
    primaryCtaUrl: /en/services/audit-offert
    secondaryCtaLabel: Contact us
    secondaryCtaUrl: /en/contact
