    seoTitle: Website redesign in Brussels | UX, performance and SEO
    seoDescription: >-
      We redesign your website without starting blindly from zero: UX/UI, speed,
      technical SEO and clear architecture to convert more visitors.
    seoInternalLinks:
      - /en/services/technical-seo-audit-brussels
