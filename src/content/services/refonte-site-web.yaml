intro: >-
  Un site qui date de 5 ans n'est plus adapté aux usages actuels ni aux
  exigences de Google. On repart de vos objectifs business pour reconstruire
  quelque chose qui travaille pour vous : plus rapide, plus clair, et qui
  raconte mieux votre histoire.
problemTitle: Les signaux qui indiquent qu'il est temps
problemBlocks:
  - kind: list
    items:
      - Votre site n'est plus représentatif de ce que vous faites
      - Les visiteurs arrivent mais ne vous contactent pas
      - Il est lent sur mobile et vous le savez
      - Votre CMS est ingérable, les mises à jour prennent des heures
      - >-
        Vous avez ajouté des pages et des sections sans logique globale depuis
        des années
      - >-
        Votre concurrent a un site meilleur que le vôtre et vous le voyez dans
        les stats
  - kind: paragraph
    body: >-
      La refonte n'est pas une dépense cosmétique. C'est un investissement sur
      la capacité de votre site à générer du chiffre.
    items: []
offerTitle: Ce qu'on refait et comment
offerItems:
  - title: Audit de l'existant
    body: >-
      On ne repart jamais de zéro sans avoir compris ce qui fonctionne. Ce qui
      marche reste, ce qui freine disparaît. Pas de page blanche inutile, pas de
      migration risquée sans plan.
  - title: Architecture & UX
    body: >-
      Arborescence repensée, parcours utilisateurs clés redessinés, hiérarchie
      du contenu rationalisée. On aligne la structure sur vos objectifs business
      avant de dessiner quoi que ce soit.
  - title: Design UI
    body: >-
      Maquettes haute fidélité, charte graphique si nécessaire, design system
      léger pour la cohérence. Validations itératives avec vous, pas de
      surprise en livraison.
  - title: Développement axé performance
    body: >-
      Intégration avec images optimisées, code propre, Core Web Vitals dans le
      vert. CMS configurable pour que vous puissiez gérer le contenu vous-même.
  - title: Migration & lancement
    body: >-
      Redirections propres, vérification de l'indexation, monitoring
      post-launch. On ne coupe pas l'ancien site sans filet. La migration est
      non destructive.
methodTitle: Notre processus Pour une refonte
methodSteps:
  - title: Cadrage
    body: >-
      Audit de l'existant, analyse Analytics / Search Console, définition des
      objectifs et de l'arborescence cible.
  - title: UX & architecture (1 semaine)
    body: >-
      Wireframes basse fidélité, parcours utilisateurs, hiérarchie du contenu
      validée.
  - title: Design UI (1 à 2 semaines)
    body: >-
      Maquettes haute fidélité, charte graphique si nécessaire, validations
      itératives.
  - title: Développement (1 à 3 semaines)
    body: Intégration performance-first, CMS configuré.
  - title: Migration & lancement
    body: Redirections, indexation, monitoring post-launch inclus.
deliverablesTitle: Résumé du produit Après livraison
deliverables:
  - Site en production, performant sur mobile et desktop
  - Score Core Web Vitals vert (LCP < 2.5s, CLS < 0.1, INP < 200ms)
  - SEO technique propre dès le départ
  - CMS pris en main lors d'une session de formation si besoin
  - Documentation des choix techniques et de la structure du contenu
  - Monitoring 30 jours post-lancement inclus
exclusionsTitle: Les choses qu'on évite de faire
exclusionsParagraphs:
  - >-
    On ne refait pas un site juste pour le refaire. Avant de toucher quoi que ce
    soit, on audite l'existant. On ne livre pas non plus une maquette statique
    en vous laissant vous débrouiller avec le développement : chez nous, design
    et développement vont ensemble.
faqTitle: Nos réponses aux questions fréquentes
faqItems:
  - question: Combien coûte une refonte de site web à Bruxelles ?
    answer: >-
      Entre 2 000 € et 8 000 € selon la complexité, le nombre de pages et les
      fonctionnalités. On détaille le périmètre après l'audit de votre site
      actuel, pour chiffrer correctement l'UX, le contenu, le développement et
      la migration SEO.
  - question: Comment éviter une perte de SEO pendant une refonte ?
    answer: >-
      On prépare les redirections, les URLs, les balises, les titres, les
      contenus importants et l'indexation avant la mise en ligne. Une refonte
      bien exécutée peut améliorer le référencement sur 3 à 6 mois.
  - question: Combien de temps prend une refonte de site web ?
    answer: >-
      De 3 à 6 semaines selon l'étendue du projet. On établit un planning dès le
      cadrage et on le tient.
  - question: Je garde mon CMS actuel ?
    answer: >-
      Ça dépend. Si votre CMS actuel est une contrainte, on vous propose une
      alternative. Si c'est un système fiable et que ça vous convient, on peut
      rester dessus.
  - question: Vous faites aussi le contenu ?
    answer: >-
      On peut travailler avec votre rédacteur ou vous recommander quelqu'un. La
      rédaction n'est pas incluse par défaut.
  - question: Pouvez-vous montrer des exemples de refontes de sites web ?
    answer: >-
      Oui. La page projets présente des sites web et interfaces sur mesure
      réalisés pour des marques, indépendants et PME belges, avec des cas de
      création, refonte et optimisation.
