notes:
  - >-
    Le lecteur cible : un fondateur de startup, un product manager en grande
    boîte qui veut tester un nouveau produit, un entrepreneur avec une idée SaaS
    B2B.
  - >-
    L'objection principale : "est-ce que vous allez comprendre mon domaine
    métier ?" → traiter ça avec la section cadrage produit.
  - >-
    Ne pas lister trop de technologies — l'essentiel est de montrer qu'on adapte
    la stack au projet. Garder la liste en FAQ.
  - >-
    Différenciateur clé : on n'est pas une agence de sous-traitance. On est un
    partenaire technique qui pousse en retour sur les décisions produit.
  - >-
    Éviter les mots startup-osphere : "pivot", "iterate fast", "ship it", "build
    in public". Rester concret et professionnel.
  - >-
    Le passage sur ce qu'on n'est pas (usine offshore) est important pour
    qualifier les leads — on cherche des clients qui veulent de la qualité, pas
    du volume.
