intro: >-
  Une landing page a un seul objectif : transformer un visiteur en client, en
  inscription ou en acheteur. Chaque élément (le titre, la hiérarchie visuelle,
  le CTA, la vitesse) est là pour ça. On crée des pages qui font le job.
problemTitle: Pour quoi faire
problemBlocks:
  - kind: item
    title: Campagnes Google Ads et Meta Ads
    body: >-
      Une landing page dédiée convertit mieux qu'une page d'accueil générique.
      Cohérence entre l'annonce et la page, message ciblé, pas de fuite vers
      d'autres pages. Le Quality Score de vos campagnes s'améliore avec ça
      aussi.
    items: []
  - kind: item
    title: Lancement de produit ou d'offre
    body: >-
      Nouveau service, nouveau produit, nouvelle offre saisonnière. Une page
      conçue spécifiquement pour ce lancement, avec un message clair et un
      formulaire ou un achat direct.
    items: []
  - kind: item
    title: Capture de leads B2B
    body: >-
      Livre blanc, webinar, démo, essai gratuit. On construit la page autour de
      la valeur que vous offrez, pas autour de votre marque.
    items: []
  - kind: item
    title: Tests A/B
    body: >-
      Vous avez déjà une landing page mais vous voulez tester une hypothèse sur
      le message ou le design. On crée une variante et on mesure.
    items: []
offerTitle: Ce qu'on intègre à votre landing page
offerItems:
  - title: Copywriting orienté conversion
    body: >-
      On rédige (ou on retravaille votre texte) avec une hiérarchie claire :
      problème, solution, preuve, action. Pas d'introduction de 3 paragraphes
      avant d'arriver au sujet.
  - title: Design sans distraction
    body: >-
      Une landing page n'est pas un site. Pas de menu avec 8 liens, pas de
      footer avec les réseaux sociaux. La mise en page guide l'œil vers le CTA
      et rien d'autre.
  - title: Performance mobile-first
    body: >-
      Plus de 60% des clics publicitaires viennent du mobile. On développe en
      performance-first : images optimisées, JS minimal, chargement < 2s. Un
      score PageSpeed dans le vert améliore directement vos coûts publicitaires.
  - title: Intégrations
    body: >-
      Formulaire connecté à votre CRM (HubSpot, Brevo, Mailchimp), pixel Meta,
      Google Tag Manager, events de conversion. On configure le tracking
      correctement dès le départ.
methodTitle: Notre méthode pour une bonne page
methodSteps:
  - title: Brief
    body: >-
      Vous décrivez l'offre, la cible, le ton, la source de trafic. On pose les
      questions qui manquent.
  - title: Structure & copywriting
    body: >-
      On propose un plan de page avec les blocs et les messages avant de passer
      au design.
  - title: Design & développement
    body: La maquette validée, on développe. Performance et mobile au centre.
  - title: Intégrations & mise en ligne
    body: Tracking, CRM, formulaire. On livre sur votre domaine.
deliverablesTitle: Résumé du produit Après livraison
deliverables:
  - Page en production sur votre domaine
  - Copywriting structuré et optimisé pour l'objectif
  - Score PageSpeed > 90 sur mobile
  - Tracking configuré (GTM, events de conversion, pixel)
  - Connexion CRM si nécessaire
  - Variantes A/B disponibles à tarif réduit
exclusionsTitle: Les choses qu'on évite de faire
exclusionsParagraphs:
  - >-
    On ne livre pas un template Unbounce ou Webflow personnalisé en surface. On
    ne promet pas un "taux de conversion de X%". Et on ne fait pas de rush en 3
    jours qui produit quelque chose de médiocre. On fait du travail sérieux dans
    des délais raisonnables.
faqTitle: Nos réponses aux questions fréquentes
faqItems:
  - question: Rédigez-vous le contenu de la landing page ?
    answer: >-
      Oui, la rédaction est incluse si vous le souhaitez. Vous fournissez le
      brief (offre, cible, ton) et on rédige. Vous pouvez aussi fournir votre
      propre texte qu'on structure et optimise.
  - question: Combien coûte une landing page à Bruxelles ?
    answer: >-
      Entre 1 200 € et 4 000 € selon la complexité. Une page épurée avec
      formulaire d'un côté, une page avec plusieurs sections, vidéo et
      intégrations CRM de l'autre.
  - question: Une landing page peut-elle être optimisée pour le SEO ?
    answer: >-
      Pour les pages publicitaires, non nécessairement : ce n'est pas leur rôle.
      Pour les pages destinées au trafic organique, oui : balises, structure,
      performance. On cadre ça ensemble selon l'objectif.
  - question: Publiez-vous la landing page sur mon domaine ?
    answer: >-
      On livre la page sur votre domaine et votre hébergeur, ou on peut
      recommander une solution. On ne vous vend pas de l'hébergement à marge.
  - question: Pouvez-vous créer plusieurs variantes pour un test A/B ?
    answer: >-
      Oui. On peut créer 2 à 3 variantes avec des messages différents pour un
      test A/B. Le prix est réduit pour les variantes d'une même page.
  - question: Combien de temps faut-il pour créer une landing page ?
    answer: >-
      Une landing page simple : 1 à 2 semaines. Une landing page complexe avec
      animations, vidéo, intégrations multiples : 2 à 4 semaines.
ctaTitle: Lancez votre prochaine campagne avec une page qui convertit
ctaParagraphs:
