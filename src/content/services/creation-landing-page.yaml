    seoTitle: Landing page development in Brussels | Horde
    seoDescription: >-
      A landing page that turns clicks into leads or sales. Built for Google
      Ads, SEO or social campaigns, fast to ship and performance-focused.
    seoInternalLinks:
      - /en/services/audit-offert
