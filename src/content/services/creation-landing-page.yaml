notes:
  - >-
    Le lecteur cible : un responsable marketing, un CEO de startup, un
    indépendant qui lance une campagne. Il veut une page rapidement, pas un
    projet de 3 mois.
  - >-
    Insister sur la rapidité de livraison (c'est une objection clé pour ce
    service) sans promettre n'importe quoi.
  - >-
    Ne pas parler de "taux de conversion de X%" sans données réelles. Dire
    "conçue pour convertir" sans chiffre fantaisiste.
  - >-
    Le différenciateur : on ne livre pas un template personnalisé, on crée
    quelque chose de propre avec du vrai copywriting et une perf mobile
    sérieuse.
  - Éviter "boost your ROI" et autres anglicismes publicitaires.
order: 2
