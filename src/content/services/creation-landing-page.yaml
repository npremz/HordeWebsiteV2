    h1: Landing page development
    shortName: Custom landing page
    footerTitle: Landing page
    intro: >-
      A landing page has one goal: turn a visitor into a client, signup or
      buyer. The headline, visual hierarchy, CTA and speed all serve that goal.
      We create pages that do the job.
    problemTitle: What it is for
    problemBlocks:
      - kind: item
        title: Google Ads and Meta Ads campaigns
        body: >-
          A dedicated landing page converts better than a generic homepage:
          tighter message match, focused copy and no leaks to unrelated pages.
          It can also improve campaign Quality Score.
        items: []
      - kind: item
        title: Product or offer launches
        body: >-
          New service, product or seasonal offer. A page built specifically for
          the launch, with a clear message and a form or direct purchase flow.
        items: []
      - kind: item
        title: B2B lead capture
        body: >-
          White paper, webinar, demo or free trial. We build the page around the
          value you offer, not around generic brand copy.
        items: []
      - kind: item
        title: A/B testing
        body: >-
          If you already have a landing page, we can create a variant to test a
          message or design hypothesis and measure the result.
        items: []
    offerTitle: What we include in your landing page
    offerItems:
      - title: Conversion-focused copywriting
        body: >-
          We write or rework the copy with a clear hierarchy: problem, solution,
          proof, action. No three-paragraph intro before the point.
      - title: Distraction-free design
        body: >-
          A landing page is not a full website. No menu with eight links, no
          social-heavy footer. The layout guides the eye to the CTA.
      - title: Mobile-first performance
        body: >-
          Most ad clicks happen on mobile. We build performance-first with
          optimized images, minimal JavaScript and fast loading.
      - title: Integrations
        body: >-
          CRM-connected forms, Meta pixel, Google Tag Manager and conversion
          events. Tracking is configured correctly from the start.
    methodTitle: Our method for a strong page
    methodSteps:
      - title: Brief
        body: >-
          You describe the offer, audience, tone and traffic source. We ask the
          missing questions.
      - title: Structure & copywriting
        body: >-
          We propose the page structure, blocks and messages before moving to
          design.
      - title: Design & development
        body: Once the design is approved, we build with performance and mobile at the center.
      - title: Integrations & launch
        body: Tracking, CRM and form setup. We publish on your domain.
    deliverablesTitle: What is delivered
    deliverables:
      - Page live on your domain
      - Structured copy optimized for the objective
      - PageSpeed score above 90 on mobile
      - Tracking configured (GTM, conversion events, pixel)
      - CRM connection if needed
      - A/B variants available at a reduced rate
    exclusionsTitle: What we avoid doing
    exclusionsParagraphs:
      - >-
        We do not ship a surface-level Unbounce or Webflow template. We do not
        promise a fake conversion rate. And we do not rush a weak page in three
        days. We do serious work in reasonable timelines.
    faqTitle: Answers to common questions
    faqItems:
      - question: Do you write the landing page copy?
        answer: >-
          Yes, copywriting is included if you want it. You provide the brief and
          we write, or you provide copy and we structure and optimize it.
      - question: How much does a landing page in Brussels cost?
        answer: >-
          Usually between 1,200 EUR and 4,000 EUR depending on complexity,
          sections, video and CRM integrations.
      - question: Can a landing page be optimized for SEO?
        answer: >-
          For ad pages, not necessarily; that is not always their job. For
          organic landing pages, yes: tags, structure and performance are
          planned accordingly.
      - question: Do you publish the landing page on my domain?
        answer: >-
          We publish on your domain and hosting, or recommend a setup. We do not
          resell hosting with hidden margin.
      - question: Can you create landing page variants for A/B testing?
        answer: >-
          Yes. We can create 2 to 3 message variants for an A/B test at a lower
          rate for the same page.
      - question: How long does it take to create a landing page?
        answer: >-
          A simple landing page takes 1 to 2 weeks. A more complex one with
          animations, video and multiple integrations takes 2 to 4 weeks.
    ctaTitle: Launch your next campaign with a page built to convert
    ctaParagraphs:
      - >-
        Fill in the form with your details and a member of our team will contact
        you for a no-commitment consultation.
      - >-
        You can also email us at hello@hordeagence.com
    primaryCtaLabel: Request a quick quote
