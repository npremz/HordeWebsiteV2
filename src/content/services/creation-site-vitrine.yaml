      - anchor: website redesign
        url: /en/services/website-redesign-brussels
intro: >-
  On crée des sites vitrines professionnels pour les entreprises, indépendants
  et marques locales qui ont besoin d'une présence claire, rapide et crédible.
problemTitle: Un site vitrine doit faire plus qu'exister
problemBlocks:
  - kind: paragraph
    body: >-
      Un site vitrine est souvent le premier vrai contact avec votre entreprise.
      Il doit expliquer votre offre, rassurer et rendre la prise de contact
      évidente.
  - kind: item
    title: Les templates diluent votre positionnement
    body: >-
      Un template peut paraître propre, mais rester incapable d'exprimer votre
      offre, votre contexte local et ce qui vous rend crédible.
  - kind: item
    title: Les pages lentes ou floues perdent les bons prospects
    body: >-
      Vos visiteurs comparent vite. Si le site est lent, vague ou trop générique,
      ils partent avant de demander un devis ou de réserver un appel.
offerTitle: Ce qu'on construit dans un site vitrine
offerItems:
  - title: Positionnement clair
    body: >-
      On structure le message autour de votre audience, de votre offre et de
      votre localisation pour rendre votre valeur compréhensible rapidement.
  - title: Interface sur mesure
    body: >-
      Le design est adapté à votre marque et à vos contenus, sans forcer votre
      activité dans une structure générique.
  - title: Bases SEO locales
    body: >-
      Titles, titres de page, maillage interne, données structurées et
      performance sont préparés pour aider Google à comprendre votre pertinence.
  - title: Édition simple
    body: >-
      On met en place un workflow qui permet à votre équipe de modifier les
      contenus importants sans toucher au code.
methodTitle: Comment avance le projet
methodSteps:
  - title: Positionnement
    body: >-
      On clarifie votre offre, vos audiences, vos différences et les pages
      prioritaires.
  - title: Structure & contenu
    body: >-
      On définit l'arborescence, la hiérarchie des pages et les blocs de contenu
      avant le design.
  - title: Design & développement
    body: >-
      On conçoit l'interface puis on développe un site rapide, responsive et
      accessible.
  - title: Mise en ligne
    body: >-
      On vérifie SEO, formulaires, analytics, redirects et performance avant la
      publication.
deliverablesTitle: Ce que vous recevez
deliverables:
  - Arborescence et structure de pages
  - Interface responsive sur mesure
  - Développement front-end rapide
  - Titles, metas et structure Hn
  - Formulaire de contact ou de lead
  - Analytics et checklist de mise en ligne
  - Accès d'édition pour les contenus
exclusionsTitle: Ce qui n'est pas inclus par défaut
exclusionsParagraphs:
  - >-
    La gestion publicitaire, les campagnes éditoriales longues ou l'identité de
    marque complète ne sont pas incluses sauf cadrage spécifique.
  - >-
    Les catalogues produits, paiements et back-offices complexes relèvent plutôt
    d'un projet e-commerce ou application web.
faqTitle: Questions fréquentes sur les sites vitrines
faqItems:
  - question: Combien de temps faut-il pour créer un site vitrine ?
    answer: >-
      La plupart des projets prennent deux à cinq semaines selon le nombre de
      pages, l'état des contenus et le rythme de validation.
  - question: Pouvez-vous écrire les contenus ?
    answer: >-
      Oui. On peut structurer et rédiger les pages principales, ou retravailler
      vos textes pour les rendre plus clairs et mieux alignés SEO.
  - question: Le site sera-t-il optimisé pour Google ?
    answer: >-
      Oui. On intègre les bases SEO techniques, la structure sémantique, les
      contrôles de performance et les signaux de pertinence locale.
ctaTitle: Besoin d'un site professionnel crédible ?
ctaParagraphs:
  - >-
    Envoyez-nous votre contexte et on vous aide à cadrer le type de site utile
    avant de chiffrer le projet.
