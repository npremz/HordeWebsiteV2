    h1: Custom showcase website development in Brussels
    shortName: Showcase website
    footerTitle: Showcase website
    intro: >-
      We create professional websites for companies, independents and local
      brands that need a clear, fast and credible online presence.
    problemTitle: A showcase website has to do more than exist
    problemBlocks:
      - kind: paragraph
        body: >-
          A business website is often the first serious contact with your
          company. It must explain what you do, reassure visitors and make the
          next step obvious.
      - kind: item
        title: Generic templates blur your positioning
        body: >-
          A template can look clean but still fail to express your offer, your
          local context and what makes your company worth contacting.
      - kind: item
        title: Slow or vague pages lose qualified leads
        body: >-
          Visitors compare quickly. If the website is slow, confusing or too
          generic, they leave before asking for a quote or booking a call.
    offerTitle: What we build into a showcase website
    offerItems:
      - title: Clear positioning
        body: >-
          We structure the message around your audience, offer and location so
          visitors understand your value quickly.
      - title: Custom interface
        body: >-
          The design is tailored to your brand and content instead of forcing
          your business into a generic template.
      - title: Local SEO foundations
        body: >-
          Titles, headings, internal links, schema and performance are prepared
          so Google can understand the page and its local relevance.
      - title: Easy content editing
        body: >-
          We set up a content workflow that lets your team update key pages
          without touching code.
    methodTitle: How the project moves
    methodSteps:
      - title: Positioning
        body: >-
          We clarify your offer, audience, differentiators and priority pages.
      - title: Structure & content
        body: >-
          We define the sitemap, page hierarchy and copy blocks before design.
      - title: Design & build
        body: >-
          We create the interface and develop a fast, responsive and accessible
          website.
      - title: Launch & checks
        body: >-
          We validate SEO basics, forms, analytics, redirects and performance
          before going live.
    deliverablesTitle: What you receive
    deliverables:
      - Strategic sitemap and page structure
      - Custom responsive interface
      - Fast front-end implementation
      - SEO title, meta and heading setup
      - Contact or lead form integration
      - Analytics and launch checklist
      - Editing access for content updates
    exclusionsTitle: What is not included by default
    exclusionsParagraphs:
      - >-
        We do not include paid acquisition management, large editorial
        campaigns or full brand identity work unless they are scoped separately.
      - >-
        Product catalogs, payment flows and complex back-office features are
        handled as e-commerce or web application projects.
    faqTitle: Showcase website FAQ
    faqItems:
      - question: How long does a showcase website take?
        answer: >-
          Most projects take two to five weeks depending on the number of pages,
          content readiness and validation rhythm.
      - question: Can you write the content?
        answer: >-
          Yes. We can structure and write the main pages, or refine your draft
          content so it is clearer and better aligned with SEO.
      - question: Will the website be optimized for Google?
        answer: >-
          Yes. We include technical SEO foundations, semantic structure,
          performance checks and local relevance signals.
    ctaTitle: Need a professional website that feels credible?
    ctaParagraphs:
      - >-
        Send us your context and we will tell you what kind of website makes
        sense before quoting the project.
    primaryCtaLabel: Start a project
    primaryCtaUrl: /en/contact
    secondaryCtaLabel: View projects
    secondaryCtaUrl: /en/projets
    reassurance: Clear scope, fast build and a website your team can maintain.
    recommendedLinks:
